<!DOCTYPE html>
<html>
<body>
  <h2>Test API Calls</h2>

  <button onclick="makeCalls()">Trigger API Calls</button>

  <script>
    function makeCalls() {
      // Success
      fetch("https://jsonplaceholder.typicode.com/posts");

      // Fail (404)
      fetch("https://jsonplaceholder.typicode.com/invalid");

      // Slow API simulation
      setTimeout(() => {
        fetch("https://jsonplaceholder.typicode.com/comments");
      }, 2000);
    }
  </script>
</body>
</html>
